name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: write
    uses: ./.github/workflows/build-and-test.yml
    with:
      is_release: ${{ startsWith(github.ref, 'refs/tags/') }}
    secrets: inherit
